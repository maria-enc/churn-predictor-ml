
# ============================================================
# .github/workflows/ci.yml · Pipeline de CI/CD
# Se ejecuta automáticamente en cada push a main
# Comprobamos cada vez que subimos un cambio que el código funciona.
# Si esto no lo añadimos al proyecto, deberíamos comprobarlo manualmente.
# Si los tests pasan, despliega automáticamente en producción.
# ============================================================

name: CI/CD · Churn Predictor

# Cuándo ejecutar este workflow
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: Ejecutar tests
    runs-on: ubuntu-latest

    steps:
      # 1 · Descargar el código del repositorio
      - name: Checkout código
        uses: actions/checkout@v4.2.2

      # 2 · Instalar Python 3.10
      - name: Setup Python 3.10
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.10"

      # 3 · Instalar las dependencias
      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt

      # 4 · Ejecutar los tests con pytest
      - name: Ejecutar tests
        run: pytest tests/test_model.py -v

  deploy:
    name: Deploy a Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: tests  # solo se ejecuta si los tests pasan

    # Solo despliega en push a main, no en pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # 1 · Descargar el código del repositorio
      - name: Checkout código
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0  # necesario para el historial completo de git

      # 2 · Subir solo los archivos necesarios a Hugging Face Spaces
      - name: Deploy a Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Clonar el Space de Hugging Face en una carpeta llamada hf_space
          git clone https://maria-enc:$HF_TOKEN@huggingface.co/spaces/maria-enc/churn-predictor hf_space
          
          # Copiar solo los archivos que necesita la demo
          cp app.py hf_space/app.py
          cp requirements.txt hf_space/requirements.txt
          mkdir -p hf_space/models
          cp models/best_model.pkl hf_space/models/best_model.pkl
          cp models/preprocessor.pkl hf_space/models/preprocessor.pkl
          
          # Commit y push al Space
          cd hf_space
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git diff --staged --quiet || git commit -m "Deploy desde GitHub Actions"
          git push
    